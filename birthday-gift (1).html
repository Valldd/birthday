<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 You Have a Gift!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

:root {
  --pink: #ff8caa;
  --pink-dark: #e85d8a;
  --pink-light: #ffb3c6;
  --blue-bg: #a8d8ea;
  --tan-bg: #e8c99a;
  --purple-bg: #9b8ec4;
  --white: #fff;
  --black: #1a1018;
  --pixel: 4px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #2a1a2e;
  background-image: radial-gradient(circle at 30% 50%, #3d1f4a 0%, #1a0d22 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Press Start 2P', monospace;
  image-rendering: pixelated;
}

/* ── OS WINDOW ── */
.os-window {
  width: 420px;
  border: 4px solid #fff;
  border-bottom: 4px solid #fff;
  box-shadow: 6px 6px 0 #000;
  position: relative;
  overflow: hidden;
}

.os-titlebar {
  height: 34px;
  background: var(--pink-dark);
  border-bottom: 4px solid #000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 6px;
  flex-shrink: 0;
}

.os-btn {
  width: 26px; height: 26px;
  background: var(--pink-light);
  border: 3px solid #000;
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #000;
  user-select: none;
}
.os-btn:hover { background: #fff; }
.os-btn:active { transform: translate(2px,2px); }
.os-btns { display: flex; gap: 5px; }

/* ── SCENE BASE ── */
.scene {
  display: none;
  min-height: 400px;
  position: relative;
  overflow: hidden;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px 18px 18px;
}
.scene.active { display: flex; }

/* scene backgrounds */
.scene-pink    { background: #ff9fb5; }
.scene-blue    { background: #a8d8ea; }
.scene-tan     { background: #dfc08a; }
.scene-purple  { background: #9b8ec4; }
.scene-start   { background: #ffc8d8; }

/* ── PIXEL CLOUDS ── */
.clouds { position: absolute; inset: 0; pointer-events: none; }
.cloud {
  position: absolute;
  image-rendering: pixelated;
}

/* ── PIXEL TEXT ── */
.px-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 16px;
  line-height: 2;
  color: #2a1020;
  text-align: center;
  z-index: 2;
  margin-bottom: 10px;
  white-space: pre-line;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
}
.px-sub {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  color: #5a3050;
  text-align: center;
  z-index: 2;
  margin-bottom: 10px;
  animation: fadeIn .4s steps(3) both;
  line-height: 1.8;
}
.px-white { color: #fff; text-shadow: 2px 2px 0 rgba(0,0,0,0.3); }

/* ── PIXEL BUTTON ── */
.px-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  background: #fff;
  color: #2a1020;
  border: 3px solid #2a1020;
  padding: 9px 18px;
  border-radius: 99px;
  box-shadow: 3px 3px 0 #2a1020;
  cursor: pointer;
  z-index: 5;
  transition: none;
  user-select: none;
}
.px-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 #2a1020; }
.px-btn:active { transform: translate(3px,3px); box-shadow: none; }
.px-btn.magenta { background: #e8409a; color: #fff; border-color: #8a1050; box-shadow: 3px 3px 0 #8a1050; }
.px-btn.blue-btn { background: #5090e0; color: #fff; border-color: #204080; box-shadow: 3px 3px 0 #204080; }

/* ── INPUT ── */
.px-input {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  border: 3px solid #2a1020;
  padding: 8px 12px;
  background: #fff;
  color: #2a1020;
  box-shadow: 3px 3px 0 #2a1020;
  outline: none;
  width: 200px;
  text-align: center;
  margin-bottom: 14px;
  z-index: 2;
}

/* ── ANIMATIONS ── */
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
@keyframes wobble { 0%,100%{transform:rotate(0)} 30%{transform:rotate(-10deg)} 70%{transform:rotate(10deg)} }
@keyframes pop    { 0%{transform:scale(.6)} 60%{transform:scale(1.15)} 100%{transform:scale(1)} }
@keyframes blink  { 0%,100%{transform:scaleY(1)} 45%,55%{transform:scaleY(.05)} }

/* ── BALLOONS ── */
.balloon-wrap { position:absolute; bottom:0; display:flex; flex-direction:column; align-items:center; }
.balloon-shape {
  width:30px; height:40px;
  border-radius:50% 50% 50% 50%/55% 55% 45% 45%;
  animation: balloonFloat 3.5s ease-in-out infinite;
}
.balloon-string { width:2px; height:20px; background:#555; }
@keyframes balloonFloat { 0%,100%{transform:rotate(-4deg)} 50%{transform:rotate(4deg) translateY(-8px)} }

/* ── WALKER ── */
.walker-wrap {
  position: absolute;
  bottom: 55px;
  left: -140px;
  z-index: 6;
  animation: walkRight 5s linear forwards;
}
@keyframes walkRight { 0%{left:-140px} 100%{left:calc(100% + 20px)} }
@keyframes legA { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@keyframes legB { 0%,100%{transform:translateY(-6px)} 50%{transform:translateY(0)} }

/* ── CONFETTI ── */
.confetti-piece {
  position: absolute;
  top: -10px;
  width: 8px; height: 8px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0%   { transform: translateY(0) rotate(0deg); opacity:1; }
  100% { transform: translateY(480px) rotate(540deg); opacity:0; }
}

/* ── STAR BURST ── */
.starburst {
  position: absolute;
  width: 8px; height: 8px;
  pointer-events: none;
  z-index: 99;
  animation: starFly .7s steps(4) forwards;
}
@keyframes starFly {
  0%   { transform: translate(0,0) scale(1); opacity:1; }
  100% { transform: translate(var(--dx),var(--dy)) scale(0); opacity:0; }
}

/* ── SCENE 6 "from/to" layout ── */
.from-to-row {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  justify-content: center;
  z-index: 2;
  width: 100%;
}
.char-col { display:flex; flex-direction:column; align-items:center; gap:6px; }
.char-label { font-family:'Press Start 2P',monospace; font-size:9px; color:#fff; text-align:center; line-height:1.9; text-shadow:2px 2px 0 rgba(0,0,0,.35); }
.msg-box {
  font-family:'Press Start 2P',monospace; font-size:7.5px;
  color:#fff; line-height:2.2;
  background:rgba(255,255,255,.18);
  border:2px solid rgba(255,255,255,.5);
  padding:10px 12px; width:100%;
  z-index:2; margin-top:10px; white-space:pre-line;
}

/* glow pulse on final scene */
@keyframes glowPulse { 0%,100%{text-shadow:0 0 8px #ffd700,2px 2px 0 rgba(0,0,0,.2)} 50%{text-shadow:0 0 20px #ffd700,2px 2px 0 rgba(0,0,0,.2)} }
.glow { animation: glowPulse 2s ease-in-out infinite; }
</style>
</head>

<script>
let cur = 0;
let name = '';

const TOTAL = 8;

function startGift() {
  name = document.getElementById('nameInput').value.trim() || 'you';
  go(1);
}

function go(n) {
  burst();
  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
  const t = document.getElementById('s' + n);
  if (!t) return;
  t.classList.add('active');
  cur = n;

  if (n === 3) {
    document.getElementById('bdMsg').textContent = 'happy birthday,\n' + name + '!';
  }

  if (n === 4) {
    // re-clone walker to restart animation
    const w = document.getElementById('walker');
    if (w) {
      const c = w.cloneNode(true);
      c.id = 'walker';
      w.parentNode.replaceChild(c, w);
    }
    setTimeout(() => { if (cur === 4) go(5); }, 5500);
  }

  if (n === 6) {
    document.getElementById('toNameLabel').textContent = name;
    document.getElementById('msgBox').textContent =
      'So proud to know you and to be your\nfriend. I hope you have a great year\nahead, filled with love, laughter, and\nall the things that make you happy.\nYou deserve it all! Keep shining\nbright, ' + name + ' \uD83D\uDC9B';
  }

  if (n === 7) {
    document.getElementById('finalMsg').textContent = 'happy birthday,\n' + name + '! \uD83C\uDF82';
    confetti();
  }
}

function prevScene() {
  if (cur > 0) go(cur - 1);
}

function burst() {
  const win = document.getElementById('win');
  const cx = win.offsetWidth / 2;
  const cy = win.offsetHeight / 2;
  const cols = ['#ffd700','#ff60b0','#50d0d0','#fff','#a0e040','#c090ff'];
  for (let i = 0; i < 12; i++) {
    const el = document.createElement('div');
    el.className = 'starburst';
    const a = (i / 12) * Math.PI * 2;
    const d = 55 + Math.random() * 55;
    el.style.cssText = `left:${cx}px;top:${cy}px;background:${cols[i%cols.length]};--dx:${Math.cos(a)*d}px;--dy:${Math.sin(a)*d}px;`;
    win.appendChild(el);
    setTimeout(() => el.remove(), 800);
  }
}

function confetti() {
  const box = document.getElementById('confettiBox');
  box.innerHTML = '';
  const cols = ['#ffd700','#ff70b8','#50d0d0','#a0e040','#c090ff','#ff9030','#fff'];
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const sz = 5 + Math.random() * 7;
    p.style.cssText =
      `width:${sz}px;height:${sz}px;` +
      `background:${cols[i % cols.length]};` +
      `left:${Math.random()*100}%;` +
      `animation-duration:${1.2 + Math.random()*1.8}s;` +
      `animation-delay:${Math.random()*1.5}s;`;
    box.appendChild(p);
  }
}

function restart() {
  name = '';
  document.getElementById('nameInput').value = '';
  go(0);
}

// allow Enter key on input
document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startGift();
});
</script>
