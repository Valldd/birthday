<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 You Have a Gift!</title>
<link rel="stylesheet" href="birthh.css">

</head>
<body>

<div class="os-window" id="win">

  <!-- TITLE BAR -->
  <div class="os-titlebar">
    <div class="os-btns">
      <button class="os-btn" onclick="prevScene()">←</button>
    </div>
    <div class="os-btns">
      <button class="os-btn">−</button>
      <button class="os-btn" onclick="win.style.display='none'">×</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       SCENE 0 — Name input
  ══════════════════════════════════════════ -->
  <div class="scene scene-start active" id="s0">
    <!-- clouds -->
    <div class="clouds">
      <svg class="cloud-top" style="position:absolute;top:14px;left:12px" width="110" height="52" viewBox="0 0 110 52">
        <rect x="8"  y="24" width="94" height="22" fill="#fff"/>
        <rect x="20" y="10" width="26" height="22" fill="#fff"/>
        <rect x="46" y="4"  width="36" height="28" fill="#fff"/>
      </svg>
      <svg class="cloud-bottom" style="position:absolute;bottom:18px;right:10px" width="90" height="44" viewBox="0 0 90 44">
        <rect x="4"  y="18" width="82" height="20" fill="#fff"/>
        <rect x="16" y="7"  width="22" height="18" fill="#fff"/>
        <rect x="36" y="2"  width="28" height="22" fill="#fff"/>
      </svg>
    </div>
    <!-- hero image -->
    <img src="14_nobg.gif" alt="birthday image" class="hero-image" />
    <p class="px-title" style="font-size:12px;">so you are the<br/>birthday person</p>
<input class="px-input" id="nameInput" type="text" placeholder="your birthday..." maxlength="12" onfocus="this.type='date'" onblur="if(!this.value) this.type='text'" />
    <button class="px-btn magenta" onclick="startGift()">let's go! →</button>
  </div>

  <!-- ══════════════════════════════════════════
       SCENE 1 — "You have a GIFT!"
  ══════════════════════════════════════════ -->
<div class="scene scene-pink" id="s1">
    <div class="clouds">
      <svg class="cloud-top" style="position:absolute;top:14px;left:10px;" width="120" height="58" viewBox="0 0 120 58">
        <rect x="8"  y="28" width="104" height="24" fill="#fff"/>
        <rect x="22" y="12" width="28"  height="24" fill="#fff"/>
        <rect x="50" y="4"  width="38"  height="30" fill="#fff"/>
        <rect x="8"  y="28" width="104" height="24" fill="none" stroke="#ffb3c6" stroke-width="3"/>
        <rect x="22" y="12" width="28"  height="24" fill="none" stroke="#ffb3c6" stroke-width="3"/>
        <rect x="50" y="4"  width="38"  height="30" fill="none" stroke="#ffb3c6" stroke-width="3"/>
      </svg>
      <svg class="cloud-bottom" style="position:absolute;bottom:90px;right:8px;" width="96" height="48" viewBox="0 0 96 48">
        <rect x="4"  y="20" width="88" height="22" fill="#fff"/>
        <rect x="18" y="8"  width="24" height="20" fill="#fff"/>
        <rect x="40" y="2"  width="30" height="24" fill="#fff"/>
        <rect x="4"  y="20" width="88" height="22" fill="none" stroke="#ffb3c6" stroke-width="3"/>
      </svg>
    </div>
    <p class="px-title">You have a<br/>GIFT !</p>
    <!-- shiba -->
    <img src="10_nobg2.png" alt="shiba" class="hero-image" style="z-index:2;margin:18px 0;width:160px;height:auto;" />
    <button class="px-btn" onclick="go(2)">open gift ?</button>
  </div>

  <!-- ══════════════════════════════════════════
       SCENE 2 — Opening gift
  ══════════════════════════════════════════ -->
  <div class="scene scene-pink" id="s2">
    <div class="clouds">
      <svg class="cloud-top" style="position:absolute;top:14px;left:10px;" width="120" height="58" viewBox="0 0 120 58">
        <rect x="8"  y="28" width="104" height="24" fill="#fff"/>
        <rect x="22" y="12" width="28"  height="24" fill="#fff"/>
        <rect x="50" y="4"  width="38"  height="30" fill="#fff"/>
        <rect x="8"  y="28" width="104" height="24" fill="none" stroke="#ffb3c6" stroke-width="3"/>
        <rect x="22" y="12" width="28"  height="24" fill="none" stroke="#ffb3c6" stroke-width="3"/>
        <rect x="50" y="4"  width="38"  height="30" fill="none" stroke="#ffb3c6" stroke-width="3"/>
      </svg>
      <svg class="cloud-bottom" style="position:absolute;bottom:90px;right:8px;" width="96" height="48" viewBox="0 0 96 48">
        <rect x="4"  y="20" width="88" height="22" fill="#fff"/>
        <rect x="18" y="8"  width="24" height="20" fill="#fff"/>
        <rect x="40" y="2"  width="30" height="24" fill="#fff"/>
        <rect x="4"  y="20" width="88" height="22" fill="none" stroke="#ffb3c6" stroke-width="3"/>
      </svg>
    </div>
    <p class="px-title">You have a<br/>GIFT !</p>
    <p class="px-sub">opening gift...</p>
    <!-- Gift image animated -->
    <img id="giftImg" src="11_nobg2.png" alt="gift" class="gift-image" style="width:150px;height:auto;" />
    <button class="px-btn" onclick="go(3)">check it out !</button>
  </div>

  <!-- ══════════════════════════════════════════
       SCENE 3 — Happy Birthday + Cinnamoroll
  ══════════════════════════════════════════ -->
  <div class="scene scene-blue" id="s3">
    <!-- balloons -->
    <div class="balloon-wrap" style="left:16px;">
      <div class="balloon-shape" style="background:#4ecdc4;animation-delay:0s"></div>
      <div class="balloon-string"></div>
    </div>
    <div class="balloon-wrap" style="left:56px;">
      <div class="balloon-shape" style="background:#ff9dba;animation-delay:-.8s"></div>
      <div class="balloon-string"></div>
    </div>
    <div class="balloon-wrap" style="right:56px;">
      <div class="balloon-shape" style="background:#a8e063;animation-delay:-.4s"></div>
      <div class="balloon-string"></div>
    </div>
    <div class="balloon-wrap" style="right:16px;">
      <div class="balloon-shape" style="background:#c77dff;animation-delay:-1.2s"></div>
      <div class="balloon-string"></div>
    </div>

    <p class="px-title" id="bdMsg" style="font-size:13px;color:#1a3060;text-shadow:none;"></p>

    <div class="scene3-party">
      <div class="party-halo"></div>
      <div class="party-lights">
        <span class="party-light light-1"></span>
        <span class="party-light light-2"></span>
        <span class="party-light light-3"></span>
        <span class="party-light light-4"></span>
        <span class="party-light light-5"></span>
      </div>
      <div class="scene3-confetti">
        <span class="confetti-piece" style="left: 6%; animation-delay:0s; background:#f9d342;"></span>
        <span class="confetti-piece" style="left: 14%; animation-delay:0.2s; background:#ff6b9c;"></span>
        <span class="confetti-piece" style="left: 22%; animation-delay:0.4s; background:#6ee0ff;"></span>
        <span class="confetti-piece" style="left: 30%; animation-delay:0.15s; background:#a062ff;"></span>
        <span class="confetti-piece" style="left: 38%; animation-delay:0.3s; background:#ffb656;"></span>
        <span class="confetti-piece" style="left: 46%; animation-delay:0.05s; background:#4edc8d;"></span>
        <span class="confetti-piece" style="left: 54%; animation-delay:0.25s; background:#ff8afb;"></span>
        <span class="confetti-piece" style="left: 62%; animation-delay:0.18s; background:#78c3ff;"></span>
        <span class="confetti-piece" style="left: 70%; animation-delay:0.35s; background:#ffdc6f;"></span>
        <span class="confetti-piece" style="left: 78%; animation-delay:0.08s; background:#d46aff;"></span>
        <span class="confetti-piece" style="left: 86%; animation-delay:0.22s; background:#6efe7e;"></span>
      </div>
      <div class="sparkle sparkle-1"></div>
      <div class="sparkle sparkle-2"></div>
      <div class="sparkle sparkle-3"></div>
      <div class="party-bubble bubble-1"></div>
      <div class="party-bubble bubble-2"></div>
      <div class="party-bubble bubble-3"></div>
      <div class="streamer streamer-1"></div>
      <div class="streamer streamer-2"></div>
      <div class="streamer streamer-3"></div>
      <img src="birth_nobg2.png" alt="birthday" class="hero-image party-image" />
    </div>

    <button class="px-btn" onclick="go(4)" style="margin-top:12px;">next...</button>
  </div>

<!-- ══════════════════════════════════════════
       SCENE 4 — Image appears from small to big
  ══════════════════════════════════════════ -->
  <div class="scene scene-tan" id="s4">
    <p class="px-title" style="font-size:11px;color:#4a2800;align-self:flex-start;padding-left:6px;line-height:2.2;">huh? what's this?<br/><br/>looks like<br/>snoopy has a<br/>message !</p>

    <!-- Image appears from small to big at bottom-right -->
    <img src="1_nobg.png" alt="scene4 image" class="scene4-bottom-right" />
  </div>

  <!-- ══════════════════════════════════════════
       SCENE 5 — "you have a gift again"
  ══════════════════════════════════════════ -->
  <div class="scene scene-tan" id="s5">
    <p class="px-title" style="font-size:10px;color:#4a2800;line-height:2.2;">hmm... it seems<br/>like you have a<br/>gift again</p>
    <p class="px-sub" style="color:#7a4820;">opening gift...</p>
    <svg width="108" height="108" viewBox="0 0 22 22" style="z-index:2;margin:8px 0;animation:wobble .4s steps(3) infinite;">
      <rect x="2"  y="10" width="18" height="11" fill="#5878d8"/>
      <rect x="1"  y="7"  width="20" height="4"  fill="#4060c0"/>
      <rect x="10" y="7"  width="2"  height="14" fill="#e82090"/>
      <rect x="2"  y="11" width="18" height="2"  fill="#e82090"/>
      <rect x="3"  y="3"  width="7"  height="6"  fill="#ff50b0" rx="3"/>
      <rect x="12" y="3"  width="7"  height="6"  fill="#ff50b0" rx="3"/>
      <rect x="9"  y="5"  width="4"  height="4"  fill="#e82090"/>
    </svg>
    <button class="px-btn magenta" onclick="go(6)">Find out..!</button>
  </div>

<!-- ══════════════════════════════════════════
       SCENE 6 — From me… to you (purple)
  ══════════════════════════════════════════ -->
  <div class="scene scene-purple" id="s6">
    <div class="from-to-row">

<!-- LEFT: from me - 11.png -->
      <div class="char-col">
        <p class="char-label">from me...</p>
        <img src="12.png" alt="from me" style="width:120px;height:auto;animation:bounce 1.4s steps(2) infinite;" />
      </div>

<!-- RIGHT: to you - 12.png -->
      <div class="char-col">
        <p class="char-label">...to you,<br/><span id="toNameLabel" style="color:#ffd700;"></span></p>
        <img src="11.png" alt="to you" style="width:120px;height:auto;animation:bounce 1.4s steps(2) -0.7s infinite;" />
      </div>
    </div>

    <div class="msg-box" id="msgBox"></div>
    <button class="px-btn blue-btn" onclick="go(7)" style="margin-top:10px;">next...</button>
  </div>

<!-- ══════════════════════════════════════════
       SCENE 7 — Final celebration
  ══════════════════════════════════════════ -->
<div class="scene scene-blue" id="s7">
  <div class="balloon-wrap" style="left:10px;">
    <div class="balloon-shape" style="background:#ff9dba;animation-delay:0s"></div>
    <div class="balloon-string"></div>
  </div>
  <div class="balloon-wrap" style="left:50px;">
    <div class="balloon-shape" style="background:#ffd700;animation-delay:-.6s"></div>
    <div class="balloon-string"></div>
  </div>
  <div class="balloon-wrap" style="right:50px;">
    <div class="balloon-shape" style="background:#4ecdc4;animation-delay:-.3s"></div>
    <div class="balloon-string"></div>
  </div>
  <div class="balloon-wrap" style="right:10px;">
    <div class="balloon-shape" style="background:#c77dff;animation-delay:-1s"></div>
    <div class="balloon-string"></div>
  </div>

  <div id="confettiBox" style="position:absolute;inset:0;pointer-events:none;z-index:10;overflow:hidden;"></div>

  <p class="px-title glow" id="finalMsg" style="font-size:13px;color:#1a3060;text-shadow:none;"></p>

  <!-- Cinnamoroll image with jump animation -->
  <img src="cc.png" alt="Cinnamoroll" class="hero-image" style="width:180px;height:auto;animation:bounce 1.3s steps(2) infinite;" />

  <div style="display:flex;gap:10px;z-index:2;font-size:22px;">🎉 🎊 🎈</div>

  <!-- Remove photo gallery -->
  <!-- <div class="photo-gallery final-gallery" id="finalGallery"></div> -->

  <button class="px-btn magenta" onclick="restart()" style="margin-top:14px;font-size:8px;">play again ↺</button>
</div>

<script>
let cur = 0;
let name = '';

const TOTAL = 8;

const DEFAULT_PHOTOS = [
  '2.jpg'
];
let photoConfig = { photos: DEFAULT_PHOTOS };

async function loadPhotoConfig() {
  try {
    const res = await fetch('birthhh.json');
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    if (Array.isArray(data.photos) && data.photos.length) {
      photoConfig.photos = data.photos;
    }
  } catch (err) {
    // fallback to built-in list
  }
}

function renderPhotos(targetId, count) {
  const target = document.getElementById(targetId);
  if (!target) return;
  target.innerHTML = '';
  const photos = photoConfig.photos.slice(0, count);
  photos.forEach(src => {
    const img = document.createElement('img');
    img.src = src;
    img.alt = 'Foto ulang tahun';
    img.loading = 'lazy';
    target.appendChild(img);
  });
}

loadPhotoConfig();

function startGift() {
  const input = document.getElementById('nameInput');
  const dob = input.value.trim();
  if (!dob) {
    alert('Please enter your birth date before continuing.');
    input.focus();
    return;
  }
  name = dob;
  go(1);
}

function go(n) {
  burst();
  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
  const t = document.getElementById('s' + n);
  if (!t) return;
  t.classList.add('active');
  cur = n;

  if (n === 3) {
    document.getElementById('bdMsg').textContent = 'happy 19th Years Old Livi!\nwish you all the best';
  }

if (n === 4) {
    // Auto-advance after animation completes
    setTimeout(() => { if (cur === 4) go(5); }, 4500);
  }

  if (n === 6) {
    document.getElementById('toNameLabel').textContent = name;
    document.getElementById('msgBox').textContent =
      'So lucky to know you in my life,\n I hope you have a great year ahead filled with love, laughter and everything that makes you happy.\n You deserve it all! Keep shining bright and wish you all the best Livi.' ;
  }

  if (n === 7) {
    document.getElementById('finalMsg').textContent = 'once again happy birthday,\n' + name + '! \uD83C\uDF82';
    renderPhotos('finalGallery', 6);
    confetti();
  }
}

function prevScene() {
  if (cur > 0) go(cur - 1);
}

function burst() {
  const win = document.getElementById('win');
  const cx = win.offsetWidth / 2;
  const cy = win.offsetHeight / 2;
  const cols = ['#ffd700','#ff60b0','#50d0d0','#fff','#a0e040','#c090ff'];
  for (let i = 0; i < 12; i++) {
    const el = document.createElement('div');
    el.className = 'starburst';
    const a = (i / 12) * Math.PI * 2;
    const d = 55 + Math.random() * 55;
    el.style.cssText = `left:${cx}px;top:${cy}px;background:${cols[i%cols.length]};--dx:${Math.cos(a)*d}px;--dy:${Math.sin(a)*d}px;`;
    win.appendChild(el);
    setTimeout(() => el.remove(), 800);
  }
}

function confetti() {
  const box = document.getElementById('confettiBox');
  box.innerHTML = '';
  const cols = ['#ffd700','#ff70b8','#50d0d0','#a0e040','#c090ff','#ff9030','#fff'];
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const sz = 5 + Math.random() * 7;
    p.style.cssText =
      `width:${sz}px;height:${sz}px;` +
      `background:${cols[i % cols.length]};` +
      `left:${Math.random()*100}%;` +
      `animation-duration:${1.2 + Math.random()*1.8}s;` +
      `animation-delay:${Math.random()*1.5}s;`;
    box.appendChild(p);
  }
}

function restart() {
  name = '';
  document.getElementById('nameInput').value = '';
  go(0);
}

// allow Enter key on input
document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startGift();
});
</script>
</body>
</html>
